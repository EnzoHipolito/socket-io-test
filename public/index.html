<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <meta name="description" content="Chat em tempo real com Socket.IO">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="chat-header">
            <div class="header-info">
                <div class="status-dot" id="status-dot"></div>
                <div>
                    <h1 class="chat-title">Chat ao Vivo</h1>
                    <span class="chat-subtitle" id="status-text">Conectando...</span>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="header-badge">
                    <span id="online-count">0</span> online
                </div>
                <a href="login.html" class="header-badge" style="text-decoration: none; background: var(--accent-gradient); color: #fff; border: none; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.25);">Entrar</a>
            </div>
        </header>

        <div class="chat-messages" id="teste">
            <div class="welcome-message">
                <span class="welcome-icon">💬</span>
                <p>Bem-vindo ao chat! Digite seu nome e comece a conversar.</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-group">
                <input type="text" placeholder="Digite uma mensagem..." id="mensagem" class="input-field input-message" maxlength="300" autocomplete="off">
                <button id="btn" class="send-btn" title="Enviar mensagem">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./scripts/script.js"></script>
</body>
</html>

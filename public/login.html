<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chat</title>
    <meta name="description" content="Faça login para acessar o chat">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app auth-app">
        <div class="auth-header">
            <h1 class="chat-title">Bem-vindo de volta</h1>
            <span class="chat-subtitle">Faça login para continuar</span>
        </div>
        
        <form class="auth-form">
            <input type="text" placeholder="Usuário" id="username" class="input-field auth-input" required autocomplete="off">
            <input type="password" placeholder="Senha" id="password" class="input-field auth-input" required>
            <button type="submit" class="send-btn auth-btn">Entrar no Chat</button>
        </form>
        
        <div class="auth-link">
            Não tem uma conta? <a href="register.html">Registre-se</a>
        </div>
        <script src="./scripts/login.js"></script>
    </div>
</body>
</html>
